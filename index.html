<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>SmartBus - Sistema Inteligente</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

</head>

<body>

<header>🚍 SmartBus</header>

<div id="popupTerminal" class="popup">
<h3>Escolha seu terminal</h3>

<select id="terminalSelect">
<option>Terminal Boqueirão</option>
<option>Terminal Cabral</option>
<option>Terminal Portão</option>
<option>Terminal Pinheirinho</option>
<option>Terminal Capão Raso</option>
</select>

<button onclick="confirmarTerminal()">Confirmar</button>
</div>

<div class="painel">
<input id="destino" placeholder="Digite o destino">
<button onclick="buscarRota()">Buscar</button>
</div>

<div id="info"></div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="script.js"></script>

</body>
</html>
